<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PCVR StreamChat Overlay</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Segoe UI, Arial, sans-serif;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #080a0d !important;
      }

      body {
        display: grid;
      }

      .stage {
        display: grid;
        width: 100%;
        height: 100%;
        padding: 8px;
        background: #080a0d;
      }

      .messages {
        display: grid;
        align-content: start;
        gap: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(8, 10, 13, 0.96);
        padding: 8px;
      }

      .empty {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
        color: #aab6c3;
        font-size: 14px;
      }

      .message {
        border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        padding: 5px 0;
      }

      .message:last-child {
        border-bottom: 0;
      }

      .row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: start;
        gap: 7px;
      }

      .meta {
        display: grid;
        grid-template-columns: auto minmax(56px, auto);
        align-items: center;
        gap: 5px;
        min-width: 0;
        color: #aebdca;
        font-size: 11px;
      }

      .platform {
        border-radius: 5px;
        padding: 1px 5px;
        color: #081018;
        font-size: 10px;
        font-weight: 800;
      }

      .platform.twitch {
        background: #a970ff;
      }

      .platform.youtube {
        background: #ff3d3d;
      }

      .platform.kick {
        background: #53fc18;
      }

      .platform.system {
        background: #53fc18;
      }

      .author {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--author-color, #ffffff);
        font-weight: 800;
      }

      .text {
        margin: 0;
        color: #f7fbff;
        font-size: 14px;
        line-height: 1.28;
        overflow-wrap: anywhere;
      }

      .emote {
        width: 20px;
        height: 20px;
        margin: 0 2px;
        vertical-align: -0.28em;
        object-fit: contain;
      }

      .text.twitch {
        color: #efe7ff;
      }

      .text.youtube {
        color: #ffe7e7;
      }

      .text.kick {
        color: #ebffdf;
      }

      .text.system {
        color: #e9fff0;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="messages" id="messages">
        <div class="empty">Waiting for chat</div>
      </section>
    </main>
  </body>
</html>
